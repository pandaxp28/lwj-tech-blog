# The Site Configuration

theme: jekyll-theme-chirpy

lang: ja

timezone: Asia/Tokyo

title: LWJ Tech Blog

tagline: 現場で使える技術メモと開発記録

description: >-
  NVIDIA Mosaic、Windows、GPU、3D ツール開発など、現場で役立つ技術メモをまとめる LWJ の技術ブログです。

url: "https://blog.lwj.co.jp"
baseurl: ""

github:
  username: pandaxp28

social:
  name: LWJ
  links:
    - https://github.com/pandaxp28
    - http://www.lwj.co.jp/

theme_mode: dark

toc: true

comments:
  provider:

pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
